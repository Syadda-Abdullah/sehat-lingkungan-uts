name: Deploy SehatLingkungan to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 1. Checkout Kode Sumber
      uses: actions/checkout@v3

    - name: 2. Login ke Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: 3. Build & Push Docker Image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/sehat-lingkungan:latest

    - name: 4. Deploy ke AWS EC2 (SSH)
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Tarik image terbaru dari Docker Hub
          sudo docker pull ${{ secrets.DOCKER_USERNAME }}/sehat-lingkungan:latest
          
          # Hentikan dan bersihkan kontainer yang lama (jika ada)
          sudo docker stop app-sehat-lingkungan || true
          sudo docker rm app-sehat-lingkungan || true
          
          # Jalankan kontainer baru dengan menyuntikkan GitHub Secrets sebagai Environment Variables
          sudo docker run -d \
            --name app-sehat-lingkungan \
            -p 80:80 \
            --restart unless-stopped \
            -e DB_HOST="${{ secrets.DB_HOST }}" \
            -e DB_USER="${{ secrets.DB_USER }}" \
            -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            -e DB_NAME="${{ secrets.DB_NAME }}" \
            -e AWS_ACCESS_KEY_ID="${{ secrets.AWS_ACCESS_KEY_ID }}" \
            -e AWS_SECRET_ACCESS_KEY="${{ secrets.AWS_SECRET_ACCESS_KEY }}" \
            -e AWS_REGION="${{ secrets.AWS_REGION }}" \
            -e S3_BUCKET_NAME="${{ secrets.S3_BUCKET_NAME }}" \
            ${{ secrets.DOCKER_USERNAME }}/sehat-lingkungan:latest  